<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Fiscalitat i Catalunya</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4ef; color: #1a1a18; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.container { background: #fff; border-radius: 16px; border: 0.5px solid #d3d1c7; padding: 2rem; max-width: 640px; width: 100%; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; color: #1a1a18; }
.subtitle { font-size: 14px; color: #5f5e5a; margin-bottom: 1.5rem; }
.progress-bar-bg { height: 6px; background: #ece9e0; border-radius: 3px; margin-bottom: 1.5rem; }
.progress-bar-fill { height: 6px; background: #378ADD; border-radius: 3px; transition: width 0.4s; }
.option-btn { display: block; width: 100%; text-align: left; padding: 12px 16px; margin-bottom: 10px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: #fff; color: #1a1a18; font-size: 15px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.option-btn:hover:not(:disabled) { background: #f5f4ef; }
.option-btn.correct { background: #eaf3de; border-color: #639922; color: #3b6d11; }
.option-btn.wrong { background: #fcebeb; border-color: #e24b4a; color: #a32d2d; }
.option-btn.reveal { background: #eaf3de; border-color: #639922; color: #3b6d11; opacity: 0.75; }
.explanation { margin-top: 1rem; padding: 12px 16px; background: #f5f4ef; font-size: 14px; color: #5f5e5a; line-height: 1.6; border-left: 3px solid #378ADD; }
.next-btn { margin-top: 1.25rem; padding: 10px 24px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: #f5f4ef; color: #1a1a18; font-size: 15px; cursor: pointer; font-family: inherit; }
.next-btn:hover { background: #ece9e0; }
.score-card { text-align: center; padding: 2rem 1rem; }
.score-number { font-size: 56px; font-weight: 500; color: #1a1a18; }
.score-sub { font-size: 16px; color: #5f5e5a; margin-bottom: 1.5rem; }
.score-msg { font-size: 15px; color: #1a1a18; margin-bottom: 1.5rem; padding: 1rem; background: #f5f4ef; border-radius: 12px; }
.restart-btn { padding: 10px 28px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: #fff; color: #1a1a18; font-size: 15px; cursor: pointer; font-family: inherit; }
.restart-btn:hover { background: #f5f4ef; }
@media (prefers-color-scheme: dark) {
  body { background: #1e1e1c; color: #e8e6df; }
  .container { background: #2c2c2a; border-color: #444441; }
  h1 { color: #e8e6df; }
  .option-btn { background: #2c2c2a; border-color: #5f5e5a; color: #e8e6df; }
  .option-btn:hover:not(:disabled) { background: #383836; }
  .progress-bar-bg { background: #383836; }
  .explanation { background: #383836; color: #b4b2a9; }
  .next-btn, .restart-btn { background: #383836; border-color: #5f5e5a; color: #e8e6df; }
  .score-msg { background: #383836; color: #e8e6df; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Quiz: Fiscalitat i Catalunya</h1>
  <p class="subtitle">Dèficit fiscal, IRPF, inversions i pressió fiscal</p>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog" style="width:0%"></div></div>
  <div id="quiz-body"></div>
</div>
<script>
const questions=[
  {cat:"IRPF",catColor:"#185FA5",q:"Catalunya és la comunitat de règim comú on una renda de 30.000€ bruts anuals paga...",opts:["Menys IRPF que a qualsevol altra comunitat","Més IRPF que a qualsevol altra comunitat","El mateix que a Madrid","Un tipus igual que a Andalusia"],correct:1,exp:"El 2023 un contribuent solter de 30.000€ pagava 5.041€ a Catalunya, la xifra més alta del règim comú. A Madrid pagava 4.638€, gairebé 400€ menys."},
  {cat:"IRPF – deflació",catColor:"#185FA5",q:"Si l'IRPF no es deflacta quan hi ha inflació, el contribuent...",opts:["Paga el mateix en termes reals","Paga menys gràcies als trams progressius","Paga més perquè la pujada nominal el fa saltar de tram","No es veu afectat si el sou no puja per sobre de l'IPC"],correct:2,exp:"La inflació fa pujar els sous nominals, empenyent contribuents a trams marginals superiors tot i perdre poder adquisitiu real. El Banc d'Espanya calcula uns 11.000M€ addicionals recaptats entre 2019-2023 per no deflactar."},
  {cat:"IRPF – deflació",catColor:"#185FA5",q:"Quants anys dels darrers 20 ha deflactat l'Estat la tarifa de l'IRPF per corregir la inflació?",opts:["Cap any","Dos anys (2008 i 2015)","Cinc anys","Cada any de manera automàtica"],correct:1,exp:"Només el 2008 (govern Zapatero) i el 2015 (govern Rajoy) s'han aplicat ajustaments per inflació a la tarifa. En tots dos casos va coincidir amb anys d'eleccions generals."},
  {cat:"Dèficit fiscal",catColor:"#0F6E56",q:"A quant va ascendir el dèficit fiscal de Catalunya amb l'Estat el 2021?",opts:["Al voltant de 5.000 M€","Al voltant de 10.000 M€","Gairebé 22.000 M€","Més de 40.000 M€"],correct:2,exp:"El Departament d'Economia va calcular 21.982 M€ l'any 2021, màxim històric en valors absoluts, equivalent al ~10% del PIB català i a la meitat del pressupost de la Generalitat."},
  {cat:"Dèficit fiscal",catColor:"#0F6E56",q:"De cada euro que Catalunya aporta als ingressos de l'Estat, quina part rep en despesa?",opts:["La mateixa part (un euro)","Uns 90 cèntims","Uns 70 cèntims","Menys de 75 cèntims"],correct:3,exp:"Catalunya aporta el ~19% dels ingressos estatals però rep menys del 14% de la despesa. Excloent Seguretat Social (no discrecional), la xifra baixa fins al 9,2%. Suposa uns 70-75 cèntims de retorn per euro aportat."},
  {cat:"Inversions de l'Estat",catColor:"#854F0B",q:"El 2023, quin percentatge de les inversions pressupostades va executar l'Estat a Catalunya?",opts:["El 90%","El 75%","El 58%","El 45%"],correct:3,exp:"L'Estat va executar només el 45% de les inversions previstes (1.028 M€ dels 2.276 M€ pressupostats). Va ser el territori amb el grau d'execució més baix. A Madrid l'execució va ser del 165%."},
  {cat:"Inversions de l'Estat",catColor:"#854F0B",q:"Dèficit acumulat en infraestructures a Catalunya entre 2009 i 2023, segons Foment del Treball?",opts:["Uns 5.000 M€","Uns 15.000 M€","Uns 42.500 M€","Uns 80.000 M€"],correct:2,exp:"Foment del Treball calcula 42.500 M€ de dèficit acumulat. La referència europea és el 2,2% del PIB en infraestructures; Catalunya sovint no arriba ni a la meitat d'aquesta cota."},
  {cat:"Pressió fiscal",catColor:"#993C1D",q:"Quin efecte té el dèficit fiscal sobre els serveis públics que reben els catalans?",opts:["Cap, la Generalitat compensa la diferència","Permet finançar infraestructures addicionals","Redueix els recursos disponibles per a sanitat, educació i serveis socials","Beneficia les empreses catalanes"],correct:2,exp:"Els ~22.000 M€ de dèficit fiscal equivalen a la suma de les despeses de Salut, Educació i Drets Socials junts. Són recursos que paguen els catalans però que no reverteixen en serveis al territori."},
  {cat:"Pressió fiscal",catColor:"#993C1D",q:"Quina recaptació addicional estima l'estudi Balladares-García-Miralles per no deflactar l'IRPF (2019-2023)?",opts:["Uns 1.000 M€","Uns 3.600 M€","Uns 9.700 M€","Uns 16.700 M€"],correct:3,exp:"L'estudi situa en 16.700 M€ la recaptació extra de l'Estat per no corregir trams ni beneficis fiscals per inflació. D'altres estimacions (Funcas) parlen d'uns 9.700 M€."},
  {cat:"Inversions de l'Estat",catColor:"#854F0B",q:"Quina inversió real per habitant va rebre Catalunya de l'Estat el 2023?",opts:["Primera comunitat, amb 320€","Al voltant de la mitjana estatal (230€)","Penúltima per la cua, amb 130€","Última, amb 80€"],correct:2,exp:"Catalunya va rebre 130€ d'inversió real per habitant el 2023, la penúltima xifra entre totes les CCAA, molt per sota de la mitjana estatal de 230€ per habitant."}
];
let current=0,score=0,answered=false;
function catStyle(c){return"background:"+c+"22;color:"+c+";border:0.5px solid "+c+"55;";}
function render(){
  const body=document.getElementById('quiz-body');
  document.getElementById('prog').style.width=(current/questions.length*100)+'%';
  if(current>=questions.length){
    const pct=Math.round(score/questions.length*100);
    const msg=pct>=80?'Excel·lent! Tens un bon coneixement de la fiscalitat catalana.':pct>=50?'No està malament! Hi ha aspectes que val la pena aprofundir.':'La fiscalitat és complexa. Repassa els temes i torna-ho a intentar!';
    body.innerHTML='<div class="score-card"><div class="score-number">'+score+'/'+questions.length+'</div><div class="score-sub">'+pct+'% correctes</div><div class="score-msg">'+msg+'</div><button class="restart-btn" onclick="restart()">Tornar a jugar</button></div>';
    return;
  }
  const q=questions[current];answered=false;
  body.innerHTML='<div style="font-size:12px;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem">Pregunta '+(current+1)+' de '+questions.length+'</div>'
    +'<span style="'+catStyle(q.catColor)+'font-size:11px;padding:3px 10px;border-radius:8px;font-weight:500;display:inline-block;margin-bottom:.75rem">'+q.cat+'</span>'
    +'<div style="font-size:17px;font-weight:500;margin-bottom:1.25rem;line-height:1.5;color:inherit">'+q.q+'</div>'
    +'<div id="opts">'+q.opts.map((o,i)=>'<button class="option-btn" onclick="answer('+i+')">'+o+'</button>').join('')+'</div>'
    +'<div id="expl" style="display:none"></div><div id="nxt"></div>';
}
function answer(idx){
  if(answered)return;answered=true;
  const q=questions[current];
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  btns[idx].classList.add(idx===q.correct?'correct':'wrong');
  if(idx!==q.correct)btns[q.correct].classList.add('reveal');
  if(idx===q.correct)score++;
  document.getElementById('expl').style.display='block';
  document.getElementById('expl').innerHTML='<div class="explanation">'+q.exp+'</div>';
  document.getElementById('nxt').innerHTML='<button class="next-btn" onclick="next()">'+(current+1<questions.length?'Següent pregunta &rarr;':'Veure resultats &rarr;')+'</button>';
}
function next(){current++;render();}
function restart(){current=0;score=0;render();}
render();
</script>
</body>
</html>
